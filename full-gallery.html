<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
}

h2 {
    text-align: center;
    color: #D4AF37;
    margin: 40px 0 20px;
    font-size: 2.5em;
}

/* Tabs */
.gallery-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.gallery-tabs button {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #D4AF37;
    color: #D4AF37;
    font-weight: 600;
    cursor: pointer;
}

.gallery-tabs button.active,
.gallery-tabs button:hover {
    background: #D4AF37;
    color: #000;
}

/* Grid */
.gallery-grid {
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding-bottom: 50px;
}

.gallery-grid img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    cursor: pointer;
    transition: 0.3s;
}

.gallery-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

@media (max-width: 768px) {
    .gallery-grid img {
        height: 200px;
    }
}

/* Back button */
.back-btn {
    display: block;
    margin: 20px auto 40px auto;
    padding: 12px 25px;
    background-color: #D4AF37; /* gold color */
    color: #000; /* better contrast than white on gold */
    font-weight: 600;
    border-radius: 4px; /* slightly rounded corners */
    text-decoration: none;
    transition: all 0.3s ease;
    width: max-content;
    text-align: center;
    border: 2px solid transparent; /* ensures smooth hover transition */
}

.back-btn:hover {
    background-color: #000000;
    color: #D4AF37;
    border-color: #D4AF37;
}
/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

.close-lightbox {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: #fff;
    cursor: pointer;
}
</style>
</head>

    <img id="lightbox-img">
</div>

<script>
/* Lightbox */
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

document.querySelectorAll('.gallery-grid img').forEach(img => {
    img.onclick = () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    };
});

document.querySelector('.close-lightbox').onclick = () => {
    lightbox.style.display = 'none';
};

lightbox.onclick = e => {
    if (e.target === lightbox) lightbox.style.display = 'none';
};

/* Tabs Filter */
const tabs = document.querySelectorAll('.tab');
const images = document.querySelectorAll('.gallery-grid img');

tabs.forEach(tab => {
    tab.onclick = () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        const filter = tab.dataset.filter;
        images.forEach(img => {
            img.style.display =
                img.dataset.category === filter ? 'block' : 'none';
        });
    };
});

/* Default show overview */
images.forEach(img => {
    img.style.display = img.dataset.category === 'overview' ? 'block' : 'none';
});
</script>
